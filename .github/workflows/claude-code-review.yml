name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "*"
          prompt: |
            Review this pull request for the openclawdreams TypeScript project.

            Focus on:
            - Correctness of logic (especially dream cycle, memory encryption, SQLite schema changes)
            - TypeScript type safety
            - Test coverage for new functionality
            - Breaking changes that should be documented
            - Any security concerns (encryption, key handling, API calls)

            Be concise. Post a single review comment summarising findings. If everything looks good, say so briefly.
